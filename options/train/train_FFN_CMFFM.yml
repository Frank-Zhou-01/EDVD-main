name: GOPRO-FFN-CMFFM
model_type: S1_Model
scale: 1
num_gpu: 1
manual_seed: 0

datasets:
  train:
    name: GOPRO
    type: GOPRODataset
    dataroot_gt: /root/GOPRO/train/gt
    dataroot_lq: /root/GOPRO/train/blur
    dataroot_event: /root/GOPRO/train/events
    meta_info_file_train: basicsr/data/meta_info/meta_info_GOPRO_GT.txt
    io_backend:
      type: disk

    num_frame: 12
    gt_size: 256
    interval_list: [1]
    random_reverse: false
    use_flip: true
    use_rot: true
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 200
    prefetch_mode: ~
    phase: train
    scale: 1

  val:
    name: GOPRO
    type: VideoRecurrentSplitClipsTestDataset
    dataroot_gt: /root/GOPRO/test/gt
    dataroot_lq: /root/GOPRO/test/blur
    dataroot_event: /root/GOPRO/test/events
    cache_data: false
    io_backend:
      type: disk

    num_frame: 10
    num_overlap: 0
    phase: val
    scale: 1

network_g:
  type: FFN_CMFFM_arch
  channels: 64
  event_dim: 6
  attn_blocks: 5
  head: 4
  fusion_blocks: 15

path:
  pretrain_network_g: ~
  strict_load_g: True
  resume_state: ~

train:
  optim_g:
    type: AdamW
    lr: !!float 5e-5
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [300000]
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 300000
  warmup_iter: -1
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

  edge_opt: ~
#    type: EdgeLoss
#    loss_weight: 0.1

  fft_opt: ~
#    type: FFT
#    loss_weight: 0.1
#    reduction: mean

val:
  val_freq: 10000
  save_img: True
  use_patch: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
    ssim:
      type: calculate_ssim
      crop_border: 0

logger:
  print_freq: 100
  save_checkpoint_freq: 10000
  use_tb_logger: false
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
