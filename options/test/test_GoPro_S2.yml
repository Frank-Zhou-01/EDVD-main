name: GOPRO_S2_test
model_type: S2_Model
scale: 1
num_gpu: 1 
manual_seed: 0

datasets:
  train:
    name: GOPRO
    type: GOPRODataset
    dataroot_gt: /root/GOPRO/train/gt
    dataroot_lq: /root/GOPRO/train/blur
    dataroot_event: /root/GOPRO/train/events
    meta_info_file_train: basicsr/data/meta_info/meta_info_GOPRO_GT.txt
    test_mode: False
    io_backend:
      type: disk

    num_frame: 15
    gt_size: 256
    interval_list: [1]
    random_reverse: false
    use_flip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 200
    prefetch_mode: ~
    phase: train
    scale: 1

  val:
    name: GOPRO
    type: VideoRecurrentSplitClipsTestDataset
    dataroot_gt: /root/GOPRO/test/gt
    dataroot_lq: /root/GOPRO/test/blur
    dataroot_event: /root/GOPRO/test/events

    cache_data: false
    io_backend:
      type: disk

    num_frame: 10
    num_overlap: 0
    phase: val
    scale: 1

network_g:
  type: S2_arch
  channels: 64
  num_heads: [ 4,8 ]
  num_blocks: 4
  n_denoise_res: 1
  linear_start: 0.1
  linear_end: 0.99
  timesteps: 4


path:
  pretrain_network_g: /root/VD-Diff-main/experiments/GOPRO_S2_best_net.pth
  strict_load_g: True
  resume_state: ~

train:
  optim_g:
    type: AdamW
    lr: !!float 8e-5
    weight_decay: !!float 4e-5
    betas: [0.9, 0.999]

  scheduler:
    type: MultiStepLR
    milestones: [300000]
    gamma: 0.5

  total_iter: 100000
  warmup_iter: -1
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean
  
  fft_opt:
    type: FFT
    loss_weight: 0.1
    reduction: mean

val:
  val_freq: 5000
  save_img: True
  use_patch: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
    ssim:
      type: calculate_ssim
      crop_border: 0

logger:
  print_freq: 1000
  save_checkpoint_freq: 5000
  use_tb_logger: false
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
